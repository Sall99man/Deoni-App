<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام ديوني الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        /* هنا وضعت لك كل كود الـ CSS الفخم */
        :root { --primary: #00ffa3; --bg-dark: #05070a; --grad: linear-gradient(135deg, #00ffa3 0%, #00bc7a 100%); }
        body { background: var(--bg-dark); color: #fff; direction: rtl; font-family: sans-serif; margin: 0; }
        .view { min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
        .btn-primary { background: var(--grad); color: #000; padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; margin: 10px 0; }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; }
    </style>
</head>
<body>
    <div id="view-home" class="view">
        <i class="fas fa-vault" style="font-size: 50px; color: var(--primary);"></i>
        <h1>نظام ديوني</h1>
        <button class="btn-primary" onclick="show('view-auth')">بوابة التجار</button>
    </div>

    <div id="view-auth" class="view hidden">
        <h2>تسجيل الدخول</h2>
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <button class="btn-primary" onclick="alert('جاري الاتصال بـ Baserow...')">دخول</button>
        <button style="background:none; color:#aaa; border:none;" onclick="show('view-home')">رجوع</button>
    </div>

    <script>
        // هنا كود الـ JS المختصر للعمل الفوري
        function show(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        console.log("System Ready!");
    </script>
</body>
</html>

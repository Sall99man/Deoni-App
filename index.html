<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام ديوني الاحترافي | النسخة الشاملة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="global-loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <div id="app-wrapper">
        <section id="view-home" class="view">
            <div class="hero-section">
                <div class="logo-area">
                    <i class="fas fa-vault logo-icon"></i>
                    <h1>نظام ديوني</h1>
                    <p>الإدارة المالية المتكاملة للمتاجر</p>
                </div>
                <div class="main-actions">
                    <button class="btn-primary-large" onclick="ui.navigateTo('view-auth')">
                        <i class="fas fa-store"></i> بوابة التجار
                    </button>
                    <button class="btn-secondary-large" onclick="ui.navigateTo('view-customer-portal')">
                        <i class="fas fa-user-search"></i> استعلام العملاء
                    </button>
                </div>
            </div>
        </section>

        <section id="view-auth" class="view hidden">
            <header class="view-header">
                <button onclick="ui.navigateTo('view-home')"><i class="fas fa-chevron-right"></i></button>
                <h2>تسجيل الدخول / الاشتراك</h2>
            </header>
            <div class="auth-box">
                <div class="tabs">
                    <button id="tab-login" class="active" onclick="ui.toggleAuth('login')">دخول</button>
                    <button id="tab-reg" onclick="ui.toggleAuth('reg')">إنشاء متجر</button>
                </div>
                <div id="form-login" class="auth-form">
                    <input type="tel" id="login-phone" placeholder="رقم الهاتف المسجل">
                    <button class="btn-action" onclick="app.login()">دخول للمتجر</button>
                </div>
                <div id="form-reg" class="auth-form hidden">
                    <input type="text" id="reg-name" placeholder="اسم المتجر">
                    <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
                    <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
                    <button class="btn-action" onclick="app.startRegistration()">إرسال كود التفعيل</button>
                </div>
                <div id="form-otp" class="auth-form hidden">
                    <p>أدخل الرمز المرسل لبريدك</p>
                    <input type="number" id="otp-input" placeholder="0000">
                    <button class="btn-action" onclick="app.verifyAndCreate()">تأكيد الحساب</button>
                </div>
            </div>
        </section>

        <section id="view-dash" class="view hidden">
            <header class="dash-nav">
                <div class="user-info">
                    <h3 id="store-display-name">تحميل...</h3>
                    <span id="store-display-id" class="badge">--</span>
                </div>
                <button class="logout-btn" onclick="location.reload()"><i class="fas fa-power-off"></i></button>
            </header>
            <div class="module-nav">
                <button class="mod-btn active" onclick="app.loadModule('customers')">العملاء</button>
                <button class="mod-btn" onclick="app.loadModule('debts')">الديون</button>
            </div>
            <div id="module-list" class="data-list"></div>
            <button class="fab" onclick="ui.openModal()"><i class="fas fa-plus"></i></button>
        </section>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
